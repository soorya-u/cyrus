# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  jobs:
    - name: ultracite
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: bun ultracite check {staged_files}

pre-push:
  jobs:
    - name: check-types
      run: bun check:types
    - name: test-unit
      run: bun test:unit

post-checkout:
  jobs:
    - name: setup-worktree
      run: bash scripts/dev/setup_worktree.sh {1} {2} {3}

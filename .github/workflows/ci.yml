name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: 1
  CLI_PUBLIC_SERVER_URL: http://localhost:8787

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: ./tooling/github/setup

      - name: Lint
        run: bun check

  check-types:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: ./tooling/github/setup

      - name: Type check
        run: bun check:types

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: check-types

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./tooling/github/setup

      - name: Unit tests
        run: bun test:unit

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check-types

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./tooling/github/setup

      - name: Integration tests
        run: bun test:integration

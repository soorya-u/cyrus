name: Nightly

# Disabled for now — manual runs only via workflow_dispatch.
on:
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: 1
  NODE_ENV: "testing"

jobs:
  test-e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    environment: testing
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: ./tooling/github/setup

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
        working-directory: tests/e2e

      - name: Require database URL
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is not configured in the testing environment."
            exit 1
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: End-to-end tests
        run: bun test:e2e
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: "testing"

  build-smoke:
    name: Build Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: ./tooling/github/setup

      - name: Build web
        run: bun build:web

      - name: Build CLI binary
        run: bun -F @cyrus/cli build

  webrtc-nightly:
    name: Real WebRTC
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: ./tooling/github/setup

      - name: node-datachannel integration
        run: bunx vitest run --project @cyrus/connections
        env:
          CYRUS_NIGHTLY_WEBRTC: "1"

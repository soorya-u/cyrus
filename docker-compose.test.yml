services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cyrus
      POSTGRES_PASSWORD: cyrus
      POSTGRES_DB: cyrus_test
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyrus -d cyrus_test"]
      interval: 2s
      timeout: 5s
      retries: 10
